<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanse i Wykresy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { text-align: center; }
        .chart-container { width: 90%; max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; }
        .calculator { width: 300px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; }
        input, select, button { width: 100%; margin: 5px 0; padding: 8px; }
    </style>
</head>
<body>

<h1>Finanse i Wykresy</h1>

<div class="chart-container">
    <h2>Wykres cen</h2>
    <select id="assetSelect">
        <option value="bitcoin">Bitcoin</option>
        <option value="ethereum">Ethereum</option>
        <option value="gold">Złoto</option>
        <option value="silver">Srebro</option>
        <option value="oil">Ropa</option>
    </select>
    <canvas id="priceChart" width="400" height="200"></canvas>
</div>

<div class="calculator">
    <h2>Kalkulator</h2>
    <input type="number" id="amount" placeholder="Ilość">
    <select id="currencySelect">
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="PLN">PLN</option>
    </select>
    <button onclick="convert()">Przelicz</button>
    <p id="result">Wynik: </p>
</div>

<script>
// Przykładowe dane do wykresu
const sampleData = {
    bitcoin: [50000, 51000, 52000, 51500, 53000, 54000, 53500],
    ethereum: [4000, 4100, 4200, 4150, 4300, 4400, 4350],
    gold: [1800, 1810, 1820, 1815, 1830, 1840, 1835],
    silver: [25, 26, 27, 26.5, 27.5, 28, 27.8],
    oil: [70, 71, 72, 71.5, 73, 74, 73.5]
};

let ctx = document.getElementById('priceChart').getContext('2d');
let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob', 'Nd'],
        datasets: [{
            label: 'Cena',
            data: sampleData.bitcoin,
            borderColor: 'blue',
            fill: false
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: true } }
    }
});

// Zmiana aktywa na wykresie
document.getElementById('assetSelect').addEventListener('change', function() {
    const asset = this.value;
    chart.data.datasets[0].data = sampleData[asset];
    chart.data.datasets[0].label = asset.charAt(0).toUpperCase() + asset.slice(1);
    chart.update();
});

// Kalkulator prosty
function convert() {
    let amount = parseFloat(document.getElementById('amount').value);
    let currency = document.getElementById('currencySelect').value;
    if (!amount) { amount = 0; }

    // Przykładowy kurs
    const rates = { USD: 1, EUR: 0.93, PLN: 4.2 };
    let result = amount * rates[currency];
    document.getElementById('result').textContent = `Wynik: ${result.toFixed(2)} ${currency}`;
}
</script>

</body>
</html>
